<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Reservation | Sample Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="preloader" id="preloader"><div class="loader-content"><h2>SAMPLE RESTAURANT</h2><div class="spinner"></div></div></div>
    
    <nav>
        <div class="logo">SAMPLE RESTAURANT</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="offers.html">Offers</a>
            <a href="events.html">Events</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle" id="theme-btn">🌗</button>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <h2>Book a Table</h2>
        <div class="card" style="padding: 30px;">
            <form onsubmit="submitReservation(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Number of People</label>
                    <input type="number" id="res-people" class="form-control" min="1" required>
                </div>
                <div class="form-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="res-date" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Request via WhatsApp</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
