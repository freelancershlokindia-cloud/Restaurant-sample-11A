<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | Sample Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="preloader" id="preloader"><div class="loader-content"><h2>SAMPLE RESTAURANT</h2><div class="spinner"></div></div></div>
    
    <nav>
        <div class="logo">SAMPLE RESTAURANT</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="offers.html">Offers</a>
            <a href="events.html">Events</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle" id="theme-btn">🌗</button>
        </div>
    </nav>

    <div class="container" style="max-width: 500px;">
        <div class="card" style="padding: 30px;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn" id="btn-show-login" style="flex: 1;" onclick="toggleAuth('login')">Login</button>
                <button class="btn btn-outline" id="btn-show-register" style="flex: 1;" onclick="toggleAuth('register')">Register</button>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <h2 style="font-size: 1.8rem;">Welcome Back</h2>
                
                <p style="margin-bottom: 15px; color: var(--grey);">
                    Admin access? Use Email: <b>admin@restaurant.com</b>
                </p>
                
                <div class="form-group">
                    <label>Phone Number (Customers) or Email (Admin)</label>
                    <input type="text" id="login-phone" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>

            <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
                <h2 style="font-size: 1.8rem;">Create Account</h2>
                <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" class="form-control" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="reg-phone" class="form-control" required></div>
                <div class="form-group"><label>Delivery Address</label><input type="text" id="reg-address" class="form-control" required></div>
                <div class="form-group"><label>Create Password</label><input type="password" id="reg-password" class="form-control" required></div>
                <button type="submit" class="btn" style="width: 100%;">Create Account</button>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
